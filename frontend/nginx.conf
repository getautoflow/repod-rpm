server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Headers de sécurité HTTP ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content-Security-Policy
    # unsafe-inline nécessaire pour Tailwind CSS inline styles (React build)
    # Le nonce-based CSP nécessiterait une réécriture du build React — prévu en v3
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' *; frame-ancestors 'none';" always;

    # Taille max des corps de requête (upload RPM).
    # Les paquets RPM peuvent dépasser 500 MB (Oracle Linux, Fedora Everything…).
    # Sans cette directive, nginx bloque à 1 MB avec HTTP 413.
    client_max_body_size 512m;

    # ── Reverse-proxy vers le backend FastAPI ─────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        # Upload RPM : laisser passer les gros corps sans limite nginx côté proxy.
        # client_max_body_size s'applique au niveau server{} ci-dessus.
        proxy_request_buffering off;
        # SSE (Server-Sent Events) : désactiver le buffering pour que les
        # données de streaming (sync sources, upload, import) arrivent en temps réel.
        proxy_buffering    off;
        proxy_cache        off;
    }

    location /health {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
        # index.html ne doit jamais être mis en cache — les bundles JS ont des hashes
        # dans leur nom et changent à chaque build. index.html doit toujours être frais.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires 0;
        }
    }

    # Gérer les fichiers dans le dossier static/
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gérer les erreurs 404
    error_page 404 /index.html;

    # Gérer les erreurs 500, 502, 503, 504
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
