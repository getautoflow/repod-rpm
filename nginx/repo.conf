server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html/repos;
    autoindex on;

    # Index principal des dépôts RPM
    location /repos/ {
        root /usr/share/nginx/html/;
        autoindex on;
    }

    # Téléchargements .rpm — log dédié pour statistiques
    location ~* \.rpm$ {
        root /usr/share/nginx/html/;
        access_log /var/log/nginx/downloads.log main;
    }

    # Métadonnées repomd.xml (servies normalement)
    location ~* repomd\.xml$ {
        root /usr/share/nginx/html/;
        add_header Cache-Control "no-cache";
    }

    # Fichiers .repo pour les clients DNF/Zypper
    location ~* \.repo$ {
        root /usr/share/nginx/html/;
        add_header Content-Type "text/plain";
    }

    # Clé publique GPG
    location ~* (RPM-GPG-KEY-.*|depot\.gpg)$ {
        root /usr/share/nginx/html/;
        add_header Content-Type "application/pgp-keys";
    }

    # Bloquer l'accès aux fichiers internes
    location ~ /repos/.*/\.git {
        deny all;
    }
}
