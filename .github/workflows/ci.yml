# ─────────────────────────────────────────────────────────────────────────────
# CI — repod-rpm
# ─────────────────────────────────────────────────────────────────────────────
# Jobs :
#   lint     → ruff (style + erreurs statiques Python)
#   test     → pytest 523 tests (Python 3.10, sans Docker)
#   docker   → build backend + frontend (sans push, vérification seule)
#
# Déclencheurs :
#   push     → toutes les branches
#   PR       → vers main / develop
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

# Un seul run par branche/PR à la fois — annule le précédent si nouveau push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint Python ──────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff
        run: |
          ruff check backend/ \
            --exclude backend/tests/ \
            --select E,F,W,I \
            --ignore E501,E402,F401 \
            --output-format github

  # ── 2. Tests backend ────────────────────────────────────────────────────────
  test:
    name: Tests (pytest ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run pytest
        working-directory: backend
        env:
          # Variables minimales pour les tests (répertoires temporaires)
          MANIFEST_DIR: /tmp/repod-test/manifests
          POOL_DIR: /tmp/repod-test/pool
          STAGING_INCOMING: /tmp/repod-test/staging/incoming
          STAGING_QUARANTINE: /tmp/repod-test/staging/quarantine
          AUDIT_DIR: /tmp/repod-test/audit
          INDEX_PATH: /tmp/repod-test/manifests/index.json
          AUTH_DB_PATH: /tmp/repod-test/auth/users.db
          SETTINGS_PATH: /tmp/repod-test/settings.json
          SECURITY_CACHE_DIR: /tmp/repod-test/security
          INDEX_DIR: /tmp/repod-test/package-index
          WEBHOOK_SECRET: ci-test-webhook-secret
        run: |
          pytest tests/ \
            --tb=short \
            -q \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # ── 3. Build Docker ─────────────────────────────────────────────────────────
  docker:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: repod-rpm/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            REACT_APP_API_URL=
            REACT_APP_REPO_URL=http://localhost:80
